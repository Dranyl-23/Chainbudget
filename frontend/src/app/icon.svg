<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Background with gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5" /> <!-- Indigo 600 -->
      <stop offset="100%" stop-color="#7C3AED" /> <!-- Violet 600 -->
    </linearGradient>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#E0E7FF" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Rounded Rectangle Base -->
  <rect width="512" height="512" rx="120" fill="url(#bg)" />

  <!-- Shield / Chain / Budget Abstract Icon -->
  <g filter="url(#shadow)" transform="translate(120, 120) scale(1.1)">
    <!-- Base Shield -->
    <path d="M125 15 L225 60 L225 140 C225 210 180 265 125 295 C70 265 25 210 25 140 L25 60 L125 15 Z" 
          fill="none" stroke="url(#iconGradient)" stroke-width="28" stroke-linejoin="round" />
    
    <!-- Link / Chain element inside -->
    <path d="M90 120 A 30 30 0 1 1 120 150 M160 180 A 30 30 0 1 1 130 150 M120 150 L130 150" 
          fill="none" stroke="url(#iconGradient)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" />
  </g>
</svg>
